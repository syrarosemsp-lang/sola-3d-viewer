<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Viewer</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background-color: #121212; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; }
        .box { width: 90vw; max-width: 800px; height: 60vh; background: #222; border-radius: 12px; overflow: hidden; }
        model-viewer { width: 100%; height: 100%; }
        .controls { margin-top: 20px; background: #333; padding: 15px; border-radius: 8px; display: flex; gap: 20px; }
    </style>
</head>
<body>

    <div class="box">
        <model-viewer id="viewer" 
                      src="./solasleepy.glb" 
                      camera-controls 
                      auto-rotate 
                      exposure="1">
        </model-viewer>
    </div>

    <div class="controls">
        <label>Brightness: </label>
        <input type="range" id="light" min="0" max="2" step="0.1" value="1">
    </div>

    <script>
        const mv = document.getElementById('viewer');
        
        // Change brightness via slider
        document.getElementById('light').addEventListener('input', (e) => {
            mv.exposure = e.target.value;
        });

        // Diagnostic check: If the model fails to load, throw a clear error on screen
        mv.addEventListener('error', (error) => {
            console.error("Model failed to load:", error);
            alert("The code is running, but the browser cannot find or read 'solasleepy.glb'. Make sure the file name matches perfectly and is in the same folder!");
        });
    </script>

</body>
</html>
