<!DOCTYPE html>
<html>
<head>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body { margin: 0; background: #0b0b0b; font-family: Arial; color: white; }
    model-viewer { width: 100vw; height: 100vh; }

    .panel {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.6);
      padding: 12px;
      border-radius: 10px;
      width: 220px;
    }

    input, button { width: 100%; margin: 5px 0; }
  </style>
</head>

<body>

<model-viewer
  id="viewer"
  src="solasleepy.glb"
  camera-controls
  auto-rotate
  exposure="0.8"
  environment-image="neutral"
  tone-mapping="aces"
  shadow-intensity="0.5">
</model-viewer>

<div class="panel">
  <b>Sleepy Controls</b>

  <label>Brightness</label>
  <input type="range" min="0.3" max="1.5" step="0.1" value="0.8"
    oninput="viewer.exposure = this.value">

  <label>Shadows</label>
  <input type="range" min="0" max="1" step="0.1" value="0.5"
    oninput="viewer.shadowIntensity = this.value">

  <button onclick="viewer.environmentImage='neutral'">Studio Light</button>
  <button onclick="viewer.environmentImage='sunset'">Sunset</button>
  <button onclick="toggleRotate()">Toggle Rotate</button>
</div>

<script>
  const viewer = document.getElementById('viewer');
  function toggleRotate() {
    viewer.autoRotate = !viewer.autoRotate;
  }
</script>

</body>
</html>
