<!DOCTYPE html>
<html>
<head>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0b0b;
      overflow: hidden;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
    }

    .panel {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.65);
      padding: 12px;
      border-radius: 12px;
      color: white;
      width: 220px;
      backdrop-filter: blur(6px);
    }

    button {
      width: 100%;
      margin: 5px 0;
      padding: 8px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #2a2a2a;
      color: white;
    }

    button:hover { background: #3a3a3a; }
  </style>
</head>

<body>

<model-viewer
  id="viewer"
  src="solasleepy.glb"
  camera-controls
  auto-rotate
  exposure="0.8"
  shadow-intensity="0.5"
  environment-image="neutral"
  tone-mapping="aces">
</model-viewer>

<div class="panel">
  <b>Sleepy</b>

  <button onclick="setLight('studio')">Studio</button>
  <button onclick="setLight('dramatic')">Dramatic</button>
  <button onclick="setLight('warm')">Warm</button>
  <button onclick="setLight('bright')">Bright</button>

  <button onclick="toggleRotate()">Toggle Rotate</button>
</div>

<script>
const viewer = document.getElementById('viewer');

function setLight(mode) {
  if (mode === 'studio') {
    viewer.environmentImage = 'neutral';
    viewer.exposure = 0.8;
    viewer.shadowIntensity = 0.4;
  }

  if (mode === 'dramatic') {
    viewer.environmentImage = 'city';
    viewer.exposure = 0.6;
    viewer.shadowIntensity = 0.9;
  }

  if (mode === 'warm') {
    viewer.environmentImage = 'sunset';
    viewer.exposure = 0.85;
    viewer.shadowIntensity = 0.5;
  }

  if (mode === 'bright') {
    viewer.environmentImage = 'neutral';
    viewer.exposure = 1.2;
    viewer.shadowIntensity = 0.2;
  }
}

function toggleRotate() {
  viewer.autoRotate = !viewer.autoRotate;
}
</script>

</body>
</html>
    <div class="lighting-panel">
        <div class="control-group">
            <label>Brightness</label>
            <input type="range" id="brightness-slider" min="30" max="200" step="5" value="100">
        </div>
        <div class="control-group">
            <label>Shadow Intensity</label>
            <input type="range" id="shadow-slider" min="0" max="2" step="0.1" value="1">
        </div>
    </div>

    <script>
        const viewer = document.querySelector("#model-env");
        document.querySelector('#brightness-slider').addEventListener('input', (e) => {
            viewer.style.filter = `brightness(${e.target.value}%)`;
        });
        document.querySelector('#shadow-slider').addEventListener('input', (e) => {
            viewer.shadowIntensity = e.target.value;
        });
    </script>
</body>
</html>
