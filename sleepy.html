<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Viewer - Sola Sleepy</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: system-ui, sans-serif; background-color: #121212; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .viewer-card { width: 90vw; max-width: 800px; height: 65vh; background: radial-gradient(#2a2a2a, #0a0a0a); border-radius: 16px; box-shadow: 0 20px 40px rgba(0,0,0,0.6); overflow: hidden; }
        model-viewer { width: 100%; height: 100%; --poster-color: transparent; }
        .lighting-panel { margin-top: 25px; background: rgba(255, 255, 255, 0.08); padding: 15px 30px; border-radius: 12px; backdrop-filter: blur(10px); display: flex; gap: 30px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); border: 1px solid rgba(255, 255, 255, 0.05); }
        .control-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; color: #b3b3b3; }
        input[type="range"] { width: 150px; cursor: pointer; accent-color: #a8a8a8; }
    </style>
</head>
<body>

    <h2 style="margin-bottom: 15px; font-weight: 400;">Sola Sleepy Showcase</h2>

    <div class="viewer-card">
        <model-viewer id="model-env" 
                      src="solasleepy.glb" 
                      camera-controls 
                      auto-rotate 
                      shadow-intensity="1" 
                      exposure="1" 
                      shadow-softness="0.5"
                      alt="Sola Sleepy 3D Model">
        </model-viewer>
    </div>

    <div class="lighting-panel">
        <div class="control-group"><label>Exposure</label><input type="range" id="exposure" min="0" max="2" step="0.05" value="1"></div>
        <div class="control-group"><label>Shadow Intensity</label><input type="range" id="shadow-intensity" min="0" max="1" step="0.05" value="1"></div>
        <div class="control-group"><label>Shadow Softness</label><input type="range" id="shadow-softness" min="0" max="1" step="0.05" value="0.5"></div>
    </div>

    <script>
        const viewer = document.querySelector("#model-env");
        document.querySelector('#exposure').addEventListener('input', (e) => viewer.exposure = e.target.value);
        document.querySelector('#shadow-intensity').addEventListener('input', (e) => viewer.shadowIntensity = e.target.value);
        document.querySelector('#shadow-softness').addEventListener('input', (e) => viewer.shadowSoftness = e.target.value);
    </script>
</body>
</html>
