<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Material Inspector - French</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: system-ui, sans-serif; background-color: #121212; color: #fff; display: flex; min-height: 100vh; overflow: hidden; }
        model-viewer { flex: 1; height: 100vh; --poster-color: transparent; filter: brightness(100%); }
        .inspector-panel { width: 280px; background: rgba(20, 20, 20, 0.85); padding: 25px; backdrop-filter: blur(15px); display: flex; flex-direction: column; gap: 24px; box-shadow: -5px 0 30px rgba(0,0,0,0.5); border-left: 1px solid rgba(255, 255, 255, 0.08); z-index: 10; }
        .panel-title { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; margin: 0 0 10px 0; color: #ff6b81; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px; }
        .control-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; color: #b3b3b3; }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: #ff6b81; }
        select { background: #2a2a2a; color: #fff; border: 1px solid #444; padding: 8px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
        .checkbox-group { display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 0.85rem; }
        .checkbox-group input { cursor: pointer; }
    </style>
</head>
<body>

    <model-viewer id="model-env" 
                  src="solafrench.glb" 
                  camera-controls 
                  auto-rotate 
                  rotation-per-second="30deg"
                  environment-image="legacy"
                  shadow-intensity="1"
                  shadow-softness="0.3"
                  alt="Sola French 3D Asset">
    </model-viewer>

    <div class="inspector-panel">
        <div><h3 class="panel-title">Asset Inspector</h3></div>
        <div class="control-group" id="variant-container" style="display:none;">
            <label for="variant-select">Material Variant (Color)</label>
            <select id="variant-select"><option>Default</option></select>
        </div>
        <div class="control-group">
            <h3 class="panel-title">Motion</h3>
            <label class="checkbox-group"><input type="checkbox" id="toggle-rotate" checked>Auto-Rotate Model</label>
            <div style="margin-top: 10px;" class="control-group">
                <label>Turn Speed</label>
                <input type="range" id="rotate-speed" min="5" max="120" step="5" value="30">
            </div>
        </div>
        <div class="control-group">
            <h3 class="panel-title">Lighting & Environment</h3>
            <div class="control-group">
                <label>Brightness</label>
                <input type="range" id="brightness-slider" min="20" max="200" step="5" value="100">
            </div>
        </div>
    </div>

    <script>
        const viewer = document.querySelector("#model-env");
        const variantSelect = document.querySelector('#variant-select');
        const variantContainer = document.querySelector('#variant-container');

        viewer.addEventListener('load', () => {
            const names = viewer.availableVariants;
            if (names && names.length > 0) {
                variantContainer.style.display = 'flex';
                variantSelect.innerHTML = names.map(name => `<option value="${name}">${name}</option>`).join('');
                variantSelect.addEventListener('input', (g) => { viewer.variantName = g.target.value; });
            }
        });

        document.querySelector('#brightness-slider').addEventListener('input', (e) => { viewer.style.filter = `brightness(${e.target.value}%)`; });
        document.querySelector('#toggle-rotate').addEventListener('change', (e) => {
            if(e.target.checked) { viewer.setAttribute('auto-rotate', ''); } else { viewer.removeAttribute('auto-rotate'); }
        });
        document.querySelector('#rotate-speed').addEventListener('input', (e) => { viewer.setAttribute('rotation-per-second', `${e.target.value}deg`); });
    </script>
</body>
</html>
