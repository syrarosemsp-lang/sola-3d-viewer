<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sola French Studio</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: system-ui, sans-serif; background-color: #121212; color: #fff; }
        model-viewer { width: 100%; height: 100%; --poster-color: transparent; background: radial-gradient(circle, #222230 0%, #101015 100%); }
        .control-panel { position: absolute; top: 20px; right: 20px; width: 230px; background: rgba(20, 20, 25, 0.85); padding: 20px; border-radius: 12px; backdrop-filter: blur(15px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(255, 255, 255, 0.08); z-index: 10; display: flex; flex-direction: column; gap: 16px; }
        .section-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; margin: 0 0 5px 0; color: #ff6b81; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; }
        .group { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: #b3b3b3; display: flex; justify-content: space-between; }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: #ff6b81; margin-top: 4px; }
        .checkbox-row { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.85rem; user-select: none; }
    </style>
</head>
<body>

    <model-viewer id="french-studio" 
                  src="https://raw.githack.com/syrarosemsp-lang/sola-3d-viewer/main/solafrench.glb" 
                  camera-controls 
                  auto-rotate 
                  shadow-intensity="1.8" 
                  shadow-softness="0.4" 
                  exposure="1.0" 
                  environment-image="neutral" 
                  camera-orbit="45deg 75deg auto"
                  rotation-per-second="20deg" 
                  interaction-prompt="none"
                  alt="Sola French 3D Asset">
    </model-viewer>

    <div class="control-panel">
        <div class="group">
            <h3 class="section-title">Lighting Setup</h3>
            <div class="group">
                <label>Brightness</label>
                <input id="exposure" type="range" min="0.2" max="2.5" step="0.05" value="1.0">
            </div>
            <div class="group">
                <label>Shadow Angle</label>
                <input id="light-angle" type="range" min="0" max="360" step="2" value="45">
            </div>
        </div>
        <div class="group">
            <label class="checkbox-row">
                <input type="checkbox" id="rotate-toggle" checked>
                Auto-Rotate
            </label>
        </div>
    </div>

    <script>
        const viewer = document.querySelector("#french-studio");
        viewer.orientation = "0deg 30deg 45deg";

        document.querySelector('#exposure').addEventListener('input', (e) => { viewer.exposure = e.target.value; });
        document.querySelector('#light-angle').addEventListener('input', (e) => { viewer.orientation = `0deg 30deg ${e.target.value}deg`; });
        document.querySelector('#rotate-toggle').addEventListener('change', (e) => {
            if(e.target.checked) { viewer.setAttribute('auto-rotate', ''); } else { viewer.removeAttribute('auto-rotate'); }
        });
    </script>
</body>
</html>
