<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Model Viewer</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .viewer-container {
            width: 90vw;
            max-width: 800px;
            height: 60vh;
            background: radial-gradient(#3a3a3a, #111111);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        model-viewer {
            width: 100%;
            height: 100%;
            --poster-color: transparent;
        }

        .controls {
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 25px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            display: flex;
            gap: 20px;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ccc;
        }

        input[type="range"] {
            cursor: pointer;
            accent-color: #ff6b81;
        }
    </style>
</head>
<body>

    <h2 style="margin-bottom: 10px;">3D Model Preview</h2>

    <div class="viewer-container">
        <model-viewer id="lighting-demo" 
                      src="solapillow.glb" 
                      camera-controls 
                      auto-rotate 
                      shadow-intensity="1" 
                      exposure="1" 
                      shadow-softness="0.5"
                      orientation="0deg 30deg 45deg"
                      alt="A 3D model viewer">
        </model-viewer>
    </div>

    <div class="controls">
        <div class="control-group">
            <label for="exposure">Brightness (Exposure)</label>
            <input type="range" id="exposure" min="0" max="2" step="0.1" value="1">
        </div>
        
        <div class="control-group">
            <label for="shadow-intensity">Shadow Intensity</label>
            <input type="range" id="shadow-intensity" min="0" max="1" step="0.1" value="1">
        </div>
        
        <div class="control-group">
            <label for="shadow-softness">Shadow Softness</label>
            <input type="range" id="shadow-softness" min="0" max="1" step="0.1" value="0.5">
        </div>
    </div>

    <script>
        const modelViewer = document.querySelector("#lighting-demo");

        document.querySelector('#exposure').addEventListener('input', (event) => {
            modelViewer.exposure = event.target.value;
        });

        document.querySelector('#shadow-intensity').addEventListener('input', (event) => {
            modelViewer.shadowIntensity = event.target.value;
        });

        document.querySelector('#shadow-softness').addEventListener('input', (event) => {
            modelViewer.shadowSoftness = event.target.value;
        });
    </script>

</body>
</html>
